name: Parity

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [closed]

permissions:
  actions: read
  contents: read

jobs:
  parity-analyze:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      has_changes: ${{ steps.gate.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          pip install parity-ai
          npm install -g @anthropic-ai/claude-code

      - name: Stage 1 — Change Detection
        id: stage1
        run: |
          echo "::group::Stage 1 — Change Detection (agent running)"
          parity run-stage 1 \
            --pr-number ${{ github.event.pull_request.number }} \
            --base-branch ${{ github.event.pull_request.base.ref }} \
            --output .parity/stage1.json
          echo "::endgroup::"
          if [ -f .parity/metadata.json ]; then
            python3 - <<'PYEOF'
          import json
          try:
              m = json.load(open(".parity/metadata.json"))
              cost = f"${m['cost_usd']:.4f}" if m.get("cost_usd") is not None else "n/a"
              print(
                  f"::notice::Stage 1 — model={m.get('model','n/a')} "
                  f"cost={cost} duration={m.get('duration_ms','n/a')}ms "
                  f"turns={m.get('num_turns','n/a')} prompt_tokens={m.get('prompt_tokens','n/a')}"
              )
          except Exception as exc:
              print(f"::warning::Could not read Stage 1 metadata: {exc}")
          PYEOF
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}

      - name: Check gate
        id: gate
        run: |
          has_changes=$(python3 -c "
          import json
          manifest = json.load(open('.parity/stage1.json'))
          print('true' if manifest.get('has_changes') else 'false')
          ")
          echo "has_changes=$has_changes" >> $GITHUB_OUTPUT
          if [ "$has_changes" = "true" ]; then
            echo "::notice::Gate OPEN — behavioral artifact changes detected, proceeding to Stage 2 & 3"
          else
            echo "::notice::Gate CLOSED — no behavioral artifact changes, skipping Stage 2 & 3"
          fi

      - name: Stage 2 — Eval Analysis
        id: stage2
        if: steps.gate.outputs.has_changes == 'true'
        run: |
          echo "::group::Stage 2 — Eval Analysis (agent running)"
          parity run-stage 2 \
            --manifest .parity/stage1.json \
            --output .parity/stage2.json
          echo "::endgroup::"
          if [ -f .parity/metadata.json ]; then
            python3 - <<'PYEOF'
          import json
          try:
              m = json.load(open(".parity/metadata.json"))
              cost = f"${m['cost_usd']:.4f}" if m.get("cost_usd") is not None else "n/a"
              print(
                  f"::notice::Stage 2 — model={m.get('model','n/a')} "
                  f"cost={cost} duration={m.get('duration_ms','n/a')}ms "
                  f"turns={m.get('num_turns','n/a')} prompt_tokens={m.get('prompt_tokens','n/a')}"
              )
          except Exception as exc:
              print(f"::warning::Could not read Stage 2 metadata: {exc}")
          PYEOF
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

      - name: Stage 3 — Native Eval Synthesis
        id: stage3
        if: steps.gate.outputs.has_changes == 'true'
        run: |
          echo "::group::Stage 3 — Native Eval Synthesis (agent running)"
          parity run-stage 3 \
            --manifest .parity/stage1.json \
            --analysis .parity/stage2.json \
            --output .parity/stage3.json
          echo "::endgroup::"
          if [ -f .parity/metadata.json ]; then
            python3 - <<'PYEOF'
          import json
          from pathlib import Path
          try:
              m = json.load(open(".parity/metadata.json"))
              s3 = json.load(open(".parity/stage3.json")) if Path(".parity/stage3.json").exists() else {}
              cost = f"${m['cost_usd']:.4f}" if m.get("cost_usd") is not None else "n/a"
              intents = s3.get("intent_count", "n/a")
              print(
                  f"::notice::Stage 3 — model={m.get('model','n/a')} "
                  f"cost={cost} duration={m.get('duration_ms','n/a')}ms "
                  f"turns={m.get('num_turns','n/a')} intents_generated={intents}"
              )
          except Exception as exc:
              print(f"::warning::Could not read Stage 3 metadata: {exc}")
          PYEOF
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Job summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          def load(path):
              p = Path(path)
              return json.loads(p.read_text()) if p.exists() else {}

          s1 = load(".parity/stage1.json")
          s3 = load(".parity/stage3.json")
          pr = "${{ github.event.pull_request.number }}"
          sha = "${{ github.event.pull_request.head.sha }}"[:7]
          changes = len(s1.get("changes", []))
          intents = s3.get("intent_count", 0) if s1.get("has_changes") else 0
          lines = [
              "## Parity Run Summary",
              "",
              "| Field | Value |",
              "|-------|-------|",
              f"| PR | #{pr} |",
              f"| SHA | `{sha}` |",
              f"| Behavioral changes detected | {changes} |",
              f"| Proposed evals | {intents} |",
          ]
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(lines) + "\n")
          PYEOF

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: .parity/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90

  parity-comment:
    if: github.event_name == 'pull_request'
    needs: parity-analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install parity-ai

      - name: Download analysis artifact
        uses: actions/download-artifact@v4
        with:
          name: parity-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: .parity/

      - name: Post PR comment (no changes)
        if: needs.parity-analyze.outputs.has_changes == 'false'
        run: parity post-comment --no-changes --pr-number ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post PR comment (evals proposed)
        if: needs.parity-analyze.outputs.has_changes == 'true'
        run: |
          parity post-comment \
            --proposal .parity/stage3.json \
            --pr-number ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  parity-write:
    if: |
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'parity:approve')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install parity-ai

      - name: Resolve analysis run
        id: resolve
        run: |
          run_id=$(parity resolve-run-id \
            --repo ${{ github.repository }} \
            --workflow-id parity.yml \
            --head-sha ${{ github.event.pull_request.head.sha }} \
            --artifact-name parity-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }})
          echo "run_id=$run_id" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download eval proposal
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.resolve.outputs.run_id }}
          name: parity-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: .parity/

      - name: Write evals to platform
        id: write
        continue-on-error: true
        run: |
          parity write-evals \
            --proposal .parity/stage3.json \
            --config parity.yaml \
            --outcome-output .parity/write-outcome.json \
            --skip-comment
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      - name: Post writeback result comment
        if: always() && steps.write.outcome != 'skipped'
        run: |
          parity post-write-comment \
            --outcome .parity/write-outcome.json \
            --pr-number ${{ github.event.pull_request.number }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
