version: 1

behavior_artifacts:
  # All behavior-defining prompts live in prompts/ as markdown files.
  # This includes the routing prompt, the rewrite prompt, the grading prompt,
  # and the answer prompt — every file that directly determines what the agent does.
  # python_patterns is shown here for reference: it detects inline prompt strings
  # in Python files (e.g., GRADE_PROMPT = "..."). Nothing in this repo uses that
  # pattern, but projects that embed prompts as Python constants would set it here.
  paths:
    - "prompts/**"
  python_patterns:
    - "*_prompt"
    - "*_instruction"
    - "system_*"
    - "*_template"
  exclude:
    - "tests/**"
    - "docs/**"

context:
  product: "context/product.md"
  users: "context/users.md"
  interactions: "context/interactions.md"
  good_examples: "context/good_examples.md"
  bad_examples: "context/bad_examples.md"
  traces_dir: "context/traces/"
  trace_max_samples: 10

platforms:
  langsmith:
    api_key_env: LANGSMITH_API_KEY

mappings:
  # Each mapping tells Probegen which LangSmith dataset covers the cases for this artifact.
  # Stage 2 reads these to measure whether the changed artifact already has eval coverage.
  # Stage 3 (after approval) writes new probes into the mapped dataset.
  - artifact: "prompts/query_or_respond.md"
    platform: langsmith
    dataset: "acme-rag-baseline"
  - artifact: "prompts/grade.md"
    platform: langsmith
    dataset: "acme-rag-baseline"
  - artifact: "prompts/rewrite.md"
    platform: langsmith
    dataset: "acme-rag-baseline"
  - artifact: "prompts/answer.md"
    platform: langsmith
    dataset: "acme-rag-baseline"

embedding:
  model: "text-embedding-3-small"
  cache_path: ".probegen/embedding_cache.db"

similarity:
  duplicate_threshold: 0.88
  boundary_threshold: 0.72

generation:
  max_probes_surfaced: 6
  max_probes_generated: 12
  diversity_limit_per_gap: 2

approval:
  # The PR must have this label AND be merged for the write-back job to fire.
  # Create this label in your GitHub repo (Issues → Labels) before running the demo.
  label: "probegen:approve"

auto_run:
  enabled: true
  # fail_on: "regression_guard" causes the CI check to fail if any regression_guard
  # probe is present in the proposal, blocking merges that introduce known regressions.
  fail_on: "regression_guard"
  notify: "pr_comment"

budgets:
  stage1_usd: 0.5
  stage2_usd: 0.75
  stage3_usd: 1.0
