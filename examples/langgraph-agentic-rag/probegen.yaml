version: 1

behavior_artifacts:
  paths:
    - "app/**"
  python_patterns:
    - "*_PROMPT"
    - "*_prompt"
    - "*_instruction"
    - "system_*"
    - "*_template"
  exclude:
    - "tests/**"
    - "docs/**"

guardrail_artifacts:
  paths: []
  python_patterns:
    - "*_judge*"
    - "*_validator*"
    - "*_classifier*"
    - "*_filter*"
    - "*_rubric*"

context:
  product: "context/product.md"
  users: "context/users.md"
  interactions: "context/interactions.md"
  good_examples: "context/good_examples.md"
  bad_examples: "context/bad_examples.md"
  traces_dir: "context/traces/"
  trace_max_samples: 10

platforms:
  langsmith:
    api_key_env: LANGSMITH_API_KEY

mappings:
  - artifact: "app/graph.py"
    platform: langsmith
    dataset: "lilian-weng-rag-baseline"

embedding:
  model: "text-embedding-3-small"
  cache_path: ".probegen/embedding_cache.db"

similarity:
  duplicate_threshold: 0.88
  boundary_threshold: 0.72

generation:
  max_probes_surfaced: 6
  max_probes_generated: 12
  diversity_limit_per_gap: 2

approval:
  label: "probegen:approve"

auto_run:
  enabled: true
  fail_on: "regression_guard"
  notify: "pr_comment"

budgets:
  stage1_usd: 0.5
  stage2_usd: 0.75
  stage3_usd: 1.0
